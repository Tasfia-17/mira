<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#0a1220"/>
    </linearGradient>
    <!-- 3D frame gradient - top face -->
    <linearGradient id="frameTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e8ff"/>
      <stop offset="100%" style="stop-color:#0090b0"/>
    </linearGradient>
    <!-- 3D frame gradient - side face -->
    <linearGradient id="frameSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003344"/>
      <stop offset="100%" style="stop-color:#001a22"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0  0 0.8 1 0 0  0 0.9 1 0 0  0 0 0 0.5 0" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip for persona image circle -->
    <clipPath id="personaClip">
      <circle cx="110" cy="110" r="85"/>
    </clipPath>
    <!-- Scanlines -->
    <pattern id="scan" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,200,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="220" fill="url(#bg)" rx="14"/>
  <rect width="600" height="220" fill="url(#scan)" rx="14"/>

  <!-- Grid -->
  <g stroke="#00c8ff" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="55" x2="600" y2="55"/>
    <line x1="0" y1="110" x2="600" y2="110"/>
    <line x1="0" y1="165" x2="600" y2="165"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="400" y1="0" x2="400" y2="220"/>
  </g>

  <!-- ── Persona image with 3D hexagonal frame ── -->

  <!-- 3D hex frame - bottom/shadow layer (offset) -->
  <polygon points="110,198 185,178 185,42 110,22 35,42 35,178"
    fill="none" stroke="#003344" stroke-width="3" opacity="0.8"
    transform="translate(5,5)"/>

  <!-- 3D hex frame - side faces (depth illusion) -->
  <polygon points="110,198 115,203 190,183 185,178" fill="url(#frameSide)" opacity="0.9"/>
  <polygon points="185,178 190,183 190,47 185,42" fill="url(#frameSide)" opacity="0.7"/>

  <!-- Persona image clipped to circle -->
  <circle cx="110" cy="110" r="88" fill="#0a1520"/>
  <image href="mira-persona.png" x="22" y="22" width="176" height="176" clip-path="url(#personaClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Hex frame front border -->
  <polygon points="110,195 183,175 183,45 110,25 37,45 37,175"
    fill="none" stroke="url(#frameTop)" stroke-width="2" filter="url(#glow)"/>

  <!-- Scan line overlay on persona -->
  <polygon points="110,195 183,175 183,45 110,25 37,45 37,175"
    fill="url(#scan)" opacity="0.3"/>

  <!-- Corner accent dots on hex -->
  <circle cx="110" cy="25" r="3" fill="#00e8ff" filter="url(#glow)"/>
  <circle cx="183" cy="45" r="3" fill="#00e8ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="183" cy="175" r="3" fill="#00e8ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="110" cy="195" r="3" fill="#00e8ff" filter="url(#glow)"/>
  <circle cx="37" cy="175" r="3" fill="#00e8ff" filter="url(#glow)" opacity="0.7"/>
  <circle cx="37" cy="45" r="3" fill="#00e8ff" filter="url(#glow)" opacity="0.7"/>

  <!-- ── MIRA text with 3D extrusion ── -->

  <!-- 3D depth layers (back to front) -->
  <g opacity="0.15">
    <text x="222" y="128" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" fill="#00c8ff" transform="translate(6,6)">MIRA</text>
  </g>
  <g opacity="0.25">
    <text x="222" y="128" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" fill="#00c8ff" transform="translate(4,4)">MIRA</text>
  </g>
  <g opacity="0.4">
    <text x="222" y="128" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900" fill="#00c8ff" transform="translate(2,2)">MIRA</text>
  </g>

  <!-- Main text face -->
  <text x="222" y="128" font-family="'Arial Black', 'Impact', sans-serif" font-size="88" font-weight="900"
    fill="url(#frameTop)" filter="url(#softGlow)">MIRA</text>

  <!-- Tagline -->
  <text x="222" y="158" font-family="'Courier New', monospace" font-size="12"
    fill="#00c8ff" opacity="0.6" letter-spacing="5">ON-CHAIN INTELLIGENCE</text>

  <!-- Divider line -->
  <line x1="222" y1="138" x2="575" y2="138" stroke="#00c8ff" stroke-width="0.5" opacity="0.2"/>

  <!-- HashKey Chain badge -->
  <rect x="222" y="168" width="160" height="22" rx="4" fill="rgba(0,200,255,0.06)" stroke="#00c8ff" stroke-width="0.5" opacity="0.6"/>
  <text x="302" y="183" font-family="'Courier New', monospace" font-size="9"
    fill="#00c8ff" opacity="0.7" text-anchor="middle" letter-spacing="2">HASHKEY CHAIN</text>

  <!-- Corner accents -->
  <g stroke="#00c8ff" stroke-width="1" fill="none" opacity="0.3">
    <path d="M8,8 L8,20 M8,8 L20,8"/>
    <path d="M592,8 L592,20 M592,8 L580,8"/>
    <path d="M8,212 L8,200 M8,212 L20,212"/>
    <path d="M592,212 L592,200 M592,212 L580,212"/>
  </g>
</svg>
