    <text x="355" y="140" text-anchor="middle" font-size="9" fill="#3a8090">live chain data</text>

    <!-- arrow -->
    <line x1="410" y1="100" x2="438" y2="100" stroke="#00c8ff" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 4 -->
    <rect x="440" y="50" width="110" height="100" rx="8" fill="#0d2030" stroke="#00c8ff" stroke-width="1.2"/>
    <rect x="440" y="50" width="110" height="3" rx="1" fill="#00c8ff" opacity="0.7"/>
    <text x="495" y="78" text-anchor="middle" font-size="11" font-weight="bold">EXECUTE</text>
    <text x="495" y="95" text-anchor="middle" font-size="9" fill="#3a8090">Swap quoted</text>
    <text x="495" y="110" text-anchor="middle" font-size="9" fill="#3a8090">Confirm tap</text>
    <text x="495" y="125" text-anchor="middle" font-size="9" fill="#3a8090">HyperIndex V3</text>
    <text x="495" y="140" text-anchor="middle" font-size="9" fill="#3a8090">on-chain tx</text>

    <!-- arrow -->
    <line x1="550" y1="100" x2="578" y2="100" stroke="#00c8ff" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 5 -->
    <rect x="580" y="50" width="110" height="100" rx="8" fill="#0d2030" stroke="#b060ff" stroke-width="1.2"/>
    <rect x="580" y="50" width="110" height="3" rx="1" fill="#b060ff" opacity="0.7"/>
    <text x="635" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#b060ff">ANCHOR</text>
    <text x="635" y="95" text-anchor="middle" font-size="9" fill="#7040a0">Action hashed</text>
    <text x="635" y="110" text-anchor="middle" font-size="9" fill="#7040a0">anchored to</text>
    <text x="635" y="125" text-anchor="middle" font-size="9" fill="#7040a0">MiraAuditLog</text>
    <text x="635" y="140" text-anchor="middle" font-size="9" fill="#7040a0">on HashKey</text>

    <!-- arrow -->
    <line x1="690" y1="100" x2="718" y2="100" stroke="#00e676" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,2"/>

    <!-- 6 -->
    <rect x="720" y="50" width="110" height="100" rx="8" fill="#0d2018" stroke="#00e676" stroke-width="1.2"/>
    <rect x="720" y="50" width="110" height="3" rx="1" fill="#00e676" opacity="0.7"/>
    <text x="775" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#00e676">VERIFY</text>
    <text x="775" y="95" text-anchor="middle" font-size="9" fill="#30a060">Anyone can</text>
    <text x="775" y="110" text-anchor="middle" font-size="9" fill="#30a060">verify on</text>
    <text x="775" y="125" text-anchor="middle" font-size="9" fill="#30a060">BlockScout</text>
    <text x="775" y="140" text-anchor="middle" font-size="9" fill="#30a060">forever</text>
