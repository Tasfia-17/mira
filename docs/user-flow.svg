  <!-- Corner accents -->
  <g stroke="#00c8ff" stroke-width="1" fill="none" opacity="0.25">
    <path d="M6,6 L6,16 M6,6 L16,6"/>
    <path d="M854,6 L854,16 M854,6 L844,6"/>
    <path d="M6,194 L6,184 M6,194 L16,194"/>
    <path d="M854,194 L854,184 M854,194 L844,194"/>
  </g>
