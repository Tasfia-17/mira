    <!-- 1 -->
    <rect x="20" y="50" width="110" height="100" rx="8" fill="#0d2030" stroke="#00c8ff" stroke-width="1.2"/>
    <rect x="20" y="50" width="110" height="3" rx="1" fill="#00c8ff" opacity="0.7"/>
    <text x="75" y="78" text-anchor="middle" font-size="11" font-weight="bold">MESSAGE</text>
    <text x="75" y="95" text-anchor="middle" font-size="9" fill="#3a8090">Open Telegram</text>
    <text x="75" y="110" text-anchor="middle" font-size="9" fill="#3a8090">message</text>
    <text x="75" y="125" text-anchor="middle" font-size="9" fill="#3a8090">@mira_hsk_bot</text>
    <text x="75" y="140" text-anchor="middle" font-size="20">💬</text>

    <!-- arrow -->
    <line x1="130" y1="100" x2="158" y2="100" stroke="#00c8ff" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 2 -->
    <rect x="160" y="50" width="110" height="100" rx="8" fill="#0d2030" stroke="#00c8ff" stroke-width="1.2"/>
    <rect x="160" y="50" width="110" height="3" rx="1" fill="#00c8ff" opacity="0.7"/>
    <text x="215" y="78" text-anchor="middle" font-size="11" font-weight="bold">CONNECT</text>
    <text x="215" y="95" text-anchor="middle" font-size="9" fill="#3a8090">Send wallet</text>
    <text x="215" y="110" text-anchor="middle" font-size="9" fill="#3a8090">address</text>
    <text x="215" y="125" text-anchor="middle" font-size="9" fill="#3a8090">MIRA loads</text>
    <text x="215" y="140" text-anchor="middle" font-size="9" fill="#3a8090">portfolio</text>

    <!-- arrow -->
    <line x1="270" y1="100" x2="298" y2="100" stroke="#00c8ff" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- 3 -->
    <rect x="300" y="50" width="110" height="100" rx="8" fill="#0d2030" stroke="#00c8ff" stroke-width="1.2"/>
    <rect x="300" y="50" width="110" height="3" rx="1" fill="#00c8ff" opacity="0.7"/>
    <text x="355" y="78" text-anchor="middle" font-size="11" font-weight="bold">ANALYZE</text>
    <text x="355" y="95" text-anchor="middle" font-size="9" fill="#3a8090">Ask anything</text>
    <text x="355" y="110" text-anchor="middle" font-size="9" fill="#3a8090">AWS Bedrock</text>
