  <!-- Step numbers -->
  <g font-family="'Courier New',monospace" font-size="9" fill="#00c8ff" opacity="0.4">
    <text x="75" y="165" text-anchor="middle">01</text>
    <text x="215" y="165" text-anchor="middle">02</text>
    <text x="355" y="165" text-anchor="middle">03</text>
    <text x="495" y="165" text-anchor="middle">04</text>
    <text x="635" y="165" text-anchor="middle">05</text>
    <text x="775" y="165" text-anchor="middle">06</text>
