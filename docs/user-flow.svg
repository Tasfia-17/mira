<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a14"/><stop offset="100%" style="stop-color:#0a1220"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00c8ff"/>
    </marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="860" height="200" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="430" y="28" font-family="'Courier New',monospace" font-size="12" fill="#00c8ff" text-anchor="middle" letter-spacing="4" opacity="0.8">USER FLOW</text>

  <!-- Steps -->
  <!-- Step boxes -->
